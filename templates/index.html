<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold text-center mb-2">Quant Terminal</h1>
        <p class="text-gray-400 text-center mb-8">Real-time AI sentiment & price analysis.</p>

        <form action="/analyze" method="POST" class="flex flex-col gap-4">
            <div>
                <label for="ticker" class="block text-sm font-medium text-gray-400 mb-1">Ticker Symbol</label>
                <input type="text" id="ticker" name="ticker" placeholder="e.g., AAPL, TSLA, MSFT" required
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white uppercase transition">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-lg hover:shadow-blue-500/30">
                Execute Analysis
            </button>
        </form>
    </div>

</body>
</html>
