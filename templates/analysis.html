<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ ticker }} - AI Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* This forces the AI's markdown bullet points to look clean */
        .ai-report h1 { font-size: 2rem; font-weight: bold; margin-bottom: 1rem; color: #fff; }
        .ai-report strong { color: #60A5FA; font-size: 1.5rem; display: block; margin-bottom: 1rem; }
        .ai-report ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #D1D5DB; line-height: 1.8; }
        .ai-report li { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        <a href="/" class="inline-flex items-center text-blue-400 hover:text-blue-300 mb-8 transition">
            &larr; Back to Terminal
        </a>

        <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 md:p-10 border border-gray-700">
            <div class="flex items-center justify-between border-b border-gray-700 pb-6 mb-6">
                <h1 class="text-4xl font-extrabold tracking-tight">{{ ticker }}</h1>
                <span class="px-4 py-1 bg-gray-700 text-xs font-semibold rounded-full uppercase tracking-wider">Live Analysis</span>
            </div>

            <div class="mb-10 p-4 bg-gray-900 rounded-xl border border-gray-700">
                <canvas id="stockChart" height="120"></canvas>
            </div>

            <div class="ai-report">
                {{ report | safe }}
            </div>
        </div>
    </div>

    <script>
        // 1. Catch the JSON strings from Python and parse them into JS arrays
        // The '| safe' filter tells Jinja not to escape the quotes
        const dates = JSON.parse('{{ x_data | safe }}');
        const prices = JSON.parse('{{ y_data | safe }}');

        // 2. Target the canvas element
        const ctx = document.getElementById('stockChart').getContext('2d');

        // 3. Draw the chart
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Closing Price (USD)',
                    data: prices,
                    borderColor: '#3b82f6', // Tailwind blue-500
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3, // Adds the smooth curve to the line
                    pointBackgroundColor: '#60a5fa',
                    pointBorderColor: '#1f2937'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false // Hides the legend box for a cleaner UI
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(17, 24, 39, 0.9)', // gray-900
                        titleColor: '#fff',
                        bodyColor: '#cbd5e1', // slate-300
                        borderColor: '#374151', // gray-700
                        borderWidth: 1
                    }
                },
                scales: {
                    y: {
                        ticks: { color: '#9ca3af' }, // gray-400
                        grid: { color: '#374151' }   // gray-700
                    },
                    x: {
                        ticks: {
                            color: '#9ca3af',
                            maxRotation: 45,
                            minRotation: 45
                        },
                        grid: { display: false } // Hides vertical grid lines for a cleaner look
                    }
                }
            }
        });
    </script>
</body>
</html>
